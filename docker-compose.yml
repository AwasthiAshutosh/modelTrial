

services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  ml-worker:
    build: ./ml-service
    platform: linux/amd64
    restart: always
    shm_size: '2gb'
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
    environment:
      - CUDA_VISIBLE_DEVICES=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./ml-service/app/models:/app/app/models
      - task_results:/app/results

  # ── ML Service (FastAPI + YOLOv8 + Stable Diffusion) ─────────────────────
  ml-service:
    build: ./ml-service
    platform: linux/amd64
    restart: always
    shm_size: '2gb'
    ports:
      - "8000:8000"
    environment:
      # The API service doesn't need GPU access, only the worker.
      - CUDA_VISIBLE_DEVICES=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      # Persist HuggingFace model cache (~5GB) across container restarts.
      # Without this, models re-download every time you rebuild.
      - hf_cache:/root/.cache/huggingface
      # Mount the models directory so you can drop in best.pt without rebuilding.
      - ./ml-service/app/models:/app/app/models
      # Mount shared volumes for image storage
      - task_results:/app/results
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 20s
      retries: 5
      # Give the service time to download and load models on first boot.
      start_period: 180s


  # ── Backend Gateway (Express.js) ──────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=${JWT_SECRET:-decoraid_fallback_dev_secret}
    # No bind mounts — source is copied in Dockerfile, node_modules are built inside the container.
    depends_on:
      ml-service:
        condition: service_started

  # ── Frontend (React, served by Nginx) ────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  # Named volume — persists HuggingFace downloads between docker-compose up/down
  hf_cache:
  task_results:
